name: Build

on:
    push:
        branches:
            - main
        paths-ignore:
            - "docs/**/*"
    pull_request:
        paths-ignore:
            - "docs/**/*"
    release:
        types: [created]
    workflow_dispatch: ~

jobs:
    build:
        runs-on: ubuntu-latest

        name: "PHP ${{ matrix.php }}"

        strategy:
            fail-fast: false
            matrix:
                php: ["8.3"]

        steps:
            -
                uses: actions/checkout@v4

            -
                name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: "${{ matrix.php }}"
                    extensions: intl, mbstring
                    coverage: xdebug

            -
                name: Install dependencies
                run: composer install

            -
                name: Run checks
                run: make ci
